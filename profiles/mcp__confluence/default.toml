[profile]
id          = "mcp__confluence"
short_name  = "confluence"
version     = "1.0.0"
description = "Confluence page and search results — extracts id, title, space, status, version"
mcp_pattern = ["mcp__confluence__*", "mcp__atlassian_confluence__*"]
author      = "sakebomb"
sample_tool = "mcp__confluence__search_content"

[strategy]
type       = "json_extract"
items_path = ["results", "pages", "content"]
fields     = [
  "id",
  "title",
  "space.name",
  "status",
  "version.number",
  "_links.webui",
]
max_items           = 10
max_chars_per_field = 200
fallback_chars      = 500

[strategy.labels]
"id"              = "ID"
"title"           = "Title"
"space.name"      = "Space"
"status"          = "Status"
"version.number"  = "Version"
"_links.webui"    = "URL"
