[profile]
id          = "mcp__teams"
short_name  = "teams"
version     = "1.0.0"
description = "Microsoft Teams messages, channels, and chats — extracts id, subject, sender, timestamp, importance"
mcp_pattern = ["mcp__teams__*", "mcp__microsoft_teams__*"]
author      = "sakebomb"
sample_tool = "mcp__teams__list_messages"

[strategy]
type       = "json_extract"
items_path = ["value", "messages", "channels", "teams", "chats"]
fields     = [
  "id",
  "subject",
  "body.content",
  "from.user.displayName",
  "createdDateTime",
  "lastModifiedDateTime",
  "importance",
  "displayName",
  "description",
  "membershipType",
  "webUrl",
]
max_items           = 10
max_chars_per_field = 200
fallback_chars      = 500

[strategy.labels]
"id"                       = "ID"
"subject"                  = "Subject"
"body.content"             = "Body"
"from.user.displayName"    = "From"
"createdDateTime"          = "Created"
"lastModifiedDateTime"     = "Modified"
"importance"               = "Importance"
"displayName"              = "Name"
"description"              = "Description"
"membershipType"           = "Membership"
"webUrl"                   = "URL"
