[profile]
id          = "mcp__notion"
short_name  = "notion"
version     = "1.0.0"
description = "Notion pages, databases, and search results — depth-limited truncation (block/property structures vary per database)"
mcp_pattern = "mcp__notion__*"
author      = "sakebomb"
sample_tool = "mcp__notion__search"

# Notion property schemas vary significantly between databases (title, select,
# multi_select, relation, formula, etc.). json_truncate is safer than
# json_extract here. For a specific database, create a targeted user profile:
#   ~/.config/mcp-recall/profiles/mcp__notion__query_<db>/default.toml
[strategy]
type            = "json_truncate"
max_depth       = 3
max_array_items = 5
fallback_chars  = 500
