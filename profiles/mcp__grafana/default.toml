[profile]
id          = "mcp__grafana"
version     = "1.0.0"
description = "Grafana dashboards, alerts, and data sources — extracts uid, title, status, url, tags"
mcp_pattern = ["mcp__grafana__*", "mcp__grafana_mcp__*"]
author      = "sakebomb"
sample_tool = "mcp__grafana__list_dashboards"

[strategy]
type       = "json_extract"
items_path = ["dashboards", "alerts", "rules", "datasources", "panels", "data"]
fields     = [
  "id",
  "uid",
  "title",
  "url",
  "status",
  "state",
  "type",
  "name",
  "tags",
  "folderTitle",
  "labels",
  "annotations",
]
max_items           = 10
max_chars_per_field = 200
fallback_chars      = 500

[strategy.labels]
"id"          = "ID"
"uid"         = "UID"
"title"       = "Title"
"url"         = "URL"
"status"      = "Status"
"state"       = "State"
"type"        = "Type"
"name"        = "Name"
"tags"        = "Tags"
"folderTitle" = "Folder"
"labels"      = "Labels"
"annotations" = "Annotations"
