[profile]
id          = "mcp__gmail"
short_name  = "gmail"
version     = "1.0.0"
description = "Gmail message lists and search results — extracts id, from, subject, date, snippet"
mcp_pattern = ["mcp__gmail__*", "mcp__google_gmail__*"]
author      = "sakebomb"
sample_tool = "mcp__gmail__list_emails"

[strategy]
type       = "json_extract"
items_path = ["messages", "emails", "threads"]
fields     = [
  "id",
  "from",
  "subject",
  "date",
  "snippet",
]
max_items           = 10
max_chars_per_field = 200
fallback_chars      = 500

[strategy.labels]
"id"      = "ID"
"from"    = "From"
"subject" = "Subject"
"date"    = "Date"
"snippet" = "Snippet"
